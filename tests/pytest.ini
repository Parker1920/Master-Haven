[pytest]
testpaths = smoke verify
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
markers =
    slow: marks tests that may take >10s (poster renders, Playwright cold-starts)
    p1: P1 priority — failures throttled by alerter (3-strike rule)
    smoke: live-infrastructure HTTP probe
    verify: in-process TestClient or pure unit test
    keeper: exercises The_Keeper code (no Discord network)
    extractor: exercises /api/extraction roundtrip
    redaction: webhook URL redaction unit test
    guardrail: DB-path guard rail unit test
filterwarnings =
    ignore::DeprecationWarning:discord.*
    ignore::DeprecationWarning:google.*
addopts = -ra --strict-markers --tb=short --color=yes
