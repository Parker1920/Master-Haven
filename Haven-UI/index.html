<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Haven Control Room - Web UI</title>
    <link rel="manifest" href="/haven-ui/manifest.webmanifest">
    <meta name="theme-color" content="#00C2B3">

    <!-- Open Graph Meta Tags for Discord/Social Embeds -->
    <!-- og:image points at the dynamic global site poster rendered by the
         backend's poster service. Bots that don't run JS get this generic
         shell's tags; the SSR shim in routes/ssr.py overrides per-route
         (e.g. /voyager/<slug>) for share URLs that warrant a tailored card. -->
    <meta property="og:title" content="Voyager's Haven">
    <meta property="og:description" content="No Man's Sky discovery management system. Track systems, planets, and civilizations across the galaxy.">
    <meta property="og:image" content="https://havenmap.online/api/posters/og_site/global.png">
    <meta property="og:url" content="https://havenmap.online/">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="Voyager's Haven">

    <!-- Twitter Card (Discord also uses this) -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Voyager's Haven">
    <meta name="twitter:description" content="No Man's Sky discovery management system. Track systems, planets, and civilizations across the galaxy.">
    <meta name="twitter:image" content="https://havenmap.online/api/posters/og_site/global.png">
    <!-- Prevent aggressive caching of HTML -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/haven-ui/sw.js').catch(()=>{});
      }
    </script>
  </body>
  </html>
