# Viobot Dashboard — Pi deployment.
# Run from this folder on the Pi:  docker compose up -d --build
# Reach it at http://<pi>:8091 direct, or live via NPM at https://viobot.havenmap.online.

services:
  viobot-dashboard:
    build:
      context: ..
      dockerfile: Dockerfile
    image: viobot-dashboard:latest
    container_name: viobot-dashboard
    env_file: ./.env
    volumes:
      # The LIVE Viobot DB. Mounted read-WRITE — the dashboard is a live config editor: writes persist
      # here (backup-before-write + optimistic concurrency), and the bot picks them up within ~30s.
      # Set VIOBOT_DB_READONLY=true in .env as an optional kill-switch to make write endpoints 403.
      - /home/pi8gb/docker/viobot-data/db:/app/data
      # Dashboard's own editable store (registry / admins / appearance) — separate from Viobot's DB.
      - /home/pi8gb/docker/viobot-dashboard-data:/app/dashboard-data
      # The Viobot docs site's built files (same dir the viobot-static container serves + auto-syncs),
      # read-only — the dashboard serves them same-origin at /docs so the Guides tab needs no subdomain.
      - /home/pi8gb/docker/viobot-static/html:/app/docs-content:ro
      # Docker socket — admin-only "Restart Viobot" button. Code is hard-restricted to the viobot container.
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "8091:8090"
    networks:
      - default          # this stack's own network
      - docker_default   # shared with Nginx Proxy Manager so it can route the HTTPS domain here
    restart: unless-stopped

networks:
  docker_default:
    external: true
