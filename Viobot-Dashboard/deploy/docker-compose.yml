# Viobot Dashboard — Pi deployment (Phase 1 testing).
# Run from this folder on the Pi:  docker compose up -d --build
# Reach it at http://<pi>:8091  (direct port; NPM proxy host + domain come later).

services:
  viobot-dashboard:
    build:
      context: ..
      dockerfile: Dockerfile
    image: viobot-dashboard:latest
    container_name: viobot-dashboard
    env_file: ./.env
    volumes:
      # The LIVE Viobot DB. Mounted read-WRITE so WAL shared-memory works for readers; the app holds
      # PRAGMA query_only=ON (VIOBOT_DB_READONLY=true) in Phase 1, so it can READ but never writes.
      - /home/pi8gb/docker/viobot-data/db:/app/data
    ports:
      - "8091:8090"
    networks:
      - default          # this stack's own network
      - docker_default   # shared with Nginx Proxy Manager so it can route the HTTPS domain here
    restart: unless-stopped

networks:
  docker_default:
    external: true
